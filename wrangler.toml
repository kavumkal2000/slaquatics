name = "slaquatics"
main = "src/worker.ts"
compatibility_date = "2026-06-28"
compatibility_flags = ["nodejs_compat"]
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[vars]
PUBLIC_SITE_URL = "https://slaquatics.com"
PUBLIC_MEDIA_BASE_URL = "https://cdn.slaquatics.com"
REQUIRE_SERVER_STORE = "true"
CMS_DEV_HOST = "cms.dev.slaquatics.com"
CMS_PROD_HOST = "cms.slaquatics.com"
CMS_SITE_ID = "slaquatics"

[triggers]
crons = ["0 14 * * 1"]

[[d1_databases]]
binding = "OPS_DB"
database_name = "slaquatics-ops-development"
database_id = "cd7a9b41-a04f-4143-b081-a02bd245f1ac"
migrations_dir = "migrations"

[[d1_databases]]
binding = "CMS_DB"
database_name = "slaquatics-cms-development"
database_id = "efd7373f-78eb-4a4b-9d65-614e7a620e43"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "slaquatics-media-development"

[[r2_buckets]]
binding = "CMS_MEDIA_BUCKET"
bucket_name = "slaquatics-cms-media-development"

[[r2_buckets]]
binding = "CMS_AUDIT_BUCKET"
bucket_name = "slaquatics-cms-audit-development"

[env.development]
name = "slaquatics-development"
routes = [
  { pattern = "cms.dev.slaquatics.com", custom_domain = true }
]

[env.development.vars]
PUBLIC_SITE_URL = "https://dev.slaquatics.com"
PUBLIC_MEDIA_BASE_URL = "https://cdn.dev.slaquatics.com"
REQUIRE_SERVER_STORE = "true"
CMS_DEV_HOST = "cms.dev.slaquatics.com"
CMS_PROD_HOST = "cms.slaquatics.com"
CMS_SITE_ID = "slaquatics"

[[env.development.d1_databases]]
binding = "OPS_DB"
database_name = "slaquatics-ops-development"
database_id = "cd7a9b41-a04f-4143-b081-a02bd245f1ac"
migrations_dir = "migrations"

[[env.development.d1_databases]]
binding = "CMS_DB"
database_name = "slaquatics-cms-development"
database_id = "efd7373f-78eb-4a4b-9d65-614e7a620e43"
migrations_dir = "migrations"

[[env.development.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "slaquatics-media-development"

[[env.development.r2_buckets]]
binding = "CMS_MEDIA_BUCKET"
bucket_name = "slaquatics-cms-media-development"

[[env.development.r2_buckets]]
binding = "CMS_AUDIT_BUCKET"
bucket_name = "slaquatics-cms-audit-development"

[env.production]
name = "slaquatics-production"
routes = [
  { pattern = "cms.slaquatics.com", custom_domain = true }
]

[env.production.vars]
PUBLIC_SITE_URL = "https://slaquatics.com"
PUBLIC_MEDIA_BASE_URL = "https://cdn.slaquatics.com"
REQUIRE_SERVER_STORE = "true"
CMS_DEV_HOST = "cms.dev.slaquatics.com"
CMS_PROD_HOST = "cms.slaquatics.com"
CMS_SITE_ID = "slaquatics"

[[env.production.d1_databases]]
binding = "OPS_DB"
database_name = "slaquatics-ops-production"
database_id = "11cf5caf-2cd8-4851-aaa4-0aa754838287"
migrations_dir = "migrations"

[[env.production.d1_databases]]
binding = "CMS_DB"
database_name = "slaquatics-cms-production"
database_id = "00f597be-2f26-4af7-b705-67c8553b7221"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "slaquatics-media-production"

[[env.production.r2_buckets]]
binding = "CMS_MEDIA_BUCKET"
bucket_name = "slaquatics-cms-media-production"

[[env.production.r2_buckets]]
binding = "CMS_AUDIT_BUCKET"
bucket_name = "slaquatics-cms-audit-production"
