# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "slaquatics"

[setup]
script = '''
set -e

node -v
npm -v

if [ -f package-lock.json ]; then
  npm ci
else
  npm install
fi

if [ -f .env.example ] && [ ! -f .env.local ]; then
  cp .env.example .env.local
fi

npm run check
npm run build
'''

[setup.darwin]
script = '''
set -e

# Use Node from your machine / Codex environment
node -v
npm -v

# Install dependencies from lockfile if present, fallback to npm install
if [ -f package-lock.json ]; then
  npm ci
else
  npm install
fi

# Copy local env placeholder if no local env exists
if [ -f .env.example ] && [ ! -f .env.local ]; then
  cp .env.example .env.local
fi

# Build once so Codex can verify the app compiles
npm run build
'''

[cleanup]
script = '''
set -e

rm -rf .next
rm -rf .open-next
rm -rf .wrangler
rm -rf out
rm -rf dist
rm -rf .turbo
rm -rf node_modules/.cache
rm -f tsconfig.tsbuildinfo
'''

[cleanup.darwin]
script = '''
set -e

rm -rf .next
rm -rf out
rm -rf dist
rm -rf .turbo
rm -rf .vercel
rm -rf .wrangler
rm -rf node_modules/.cache
rm -f tsconfig.tsbuildinfo

# Optional: only use this if installs get weird
# rm -rf node_modules
'''

