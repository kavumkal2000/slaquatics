services:
  - type: web
    name: shoreline-aquatics
    runtime: static
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /ops.html
        name: X-Robots-Tag
        value: noindex
      - path: /ops-login.html
        name: X-Robots-Tag
        value: noindex
  - type: web
    name: shoreline-aquatics-ops
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shoreline-aquatics-ops-db
          property: connectionString
      - key: OPS_PASSWORD
        sync: false
      - key: OPS_DEV_USERNAME
        sync: false
      - key: OPS_DEV_PASSWORD
        sync: false
      - key: OPS_OWNER_USERNAME
        sync: false
      - key: OPS_OWNER_PASSWORD
        sync: false
      - key: OPS_OWNER_PASSWORD_HASH
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: REQUIRE_SERVER_STORE
        value: true
      - key: PUBLIC_SITE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: BOOKING_ALERT_EMAILS
        sync: false
      - key: GOOGLE_REVIEW_URL
        sync: false
      - key: FACEBOOK_REVIEW_URL
        sync: false
      - key: AUTO_SEND_REVIEW_REQUESTS
        sync: false
      - key: REVIEW_REQUEST_CHANNEL
        sync: false
      - key: SOCIAL_AUTOMATION_WEBHOOK_URL
        sync: false
      - key: SOCIAL_AUTOMATION_WEBHOOK_SECRET
        sync: false
      - key: SOCIAL_FACEBOOK_WEBHOOK_URL
        sync: false
      - key: SOCIAL_INSTAGRAM_WEBHOOK_URL
        sync: false
      - key: SOCIAL_X_WEBHOOK_URL
        sync: false
      - key: SOCIAL_TIKTOK_WEBHOOK_URL
        sync: false

databases:
  - name: shoreline-aquatics-ops-db
    plan: free
