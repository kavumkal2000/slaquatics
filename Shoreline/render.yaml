services:
  - type: web
    name: shoreline-aquatics
    runtime: static
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /ops.html
        name: X-Robots-Tag
        value: noindex
      - path: /ops-login.html
        name: X-Robots-Tag
        value: noindex
  - type: web
    name: shoreline-aquatics-ops
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shoreline-aquatics-ops-db
          property: connectionString
      - key: OPS_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: shoreline-aquatics-ops-db
    plan: free
