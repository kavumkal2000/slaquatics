name: CI

# Runs static validation, migration tests, and Cloudflare build checks on push/PR.

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check
      - run: npm run cf:build
