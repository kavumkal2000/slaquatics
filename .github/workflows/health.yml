name: Health

# Catches bugs before they ship, and outages after.
# - `check` runs on every push/PR to main: syntax + JSON-LD + pricing consistency.
# - `smoke` runs daily and on-demand: hits the live site + API; a failure emails
#   the repo owner automatically (GitHub default notification).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 13 * * *'   # ~8:00 AM Central daily — verify the live site is up
  workflow_dispatch: {}

jobs:
  check:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check

  smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run smoke
