name: Cloudflare Workers

on:
  pull_request:
    branches:
      - development
      - main
  push:
    branches:
      - development
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-worker-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Worker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate and build
        run: npm run check && npm run cf:build

  deploy:
    name: Deploy Worker
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ] || [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN repository secret." >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run cf:build

      - name: Deploy development Worker
        if: github.ref_name == 'development'
        run: npm run cf:deploy:dev

      - name: Deploy production Worker
        if: github.ref_name == 'main'
        run: npm run cf:deploy:prod
